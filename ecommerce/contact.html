<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | ShopEasy</title>

    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/responsive.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<header class="header">

    <div class="logo">
        <a href="index.html">
            <h2>ShopEasy</h2>
        </a>
    </div>

    <nav class="navbar">
        <ul class="nav-links">

            <li><a href="index.html">Home</a></li>

            <li><a href="products.html">Products</a></li>

            <li><a href="about.html">About</a></li>

            <li><a href="contact.html" class="active">Contact</a></li>

            <li>
                <a href="cart.html">
                    <i class="fa-solid fa-cart-shopping"></i>
                    Cart
                    <span id="cart-count">0</span>
                </a>
            </li>

        </ul>
    </nav>

</header>

<section class="page-banner">

    <h1>Contact Us</h1>

    <p>We would love to hear from you.</p>

</section>

<section class="contact-section">

    <div class="contact-form">

        <form>

            <input
                type="text"
                placeholder="Your Name"
                required
            >

            <input
                type="email"
                placeholder="Email Address"
                required
            >

            <input
                type="text"
                placeholder="Subject"
                required
            >

            <textarea
                rows="6"
                placeholder="Your Message"
                required
            ></textarea>

            <button
                type="submit"
                class="btn">
                Send Message
            </button>

        </form>

    </div>

    <div class="contact-info">

        <h2>Get in Touch</h2>

        <p><i class="fa-solid fa-location-dot"></i> Hyderabad, India</p>

        <p><i class="fa-solid fa-phone"></i> +91 9876543210</p>

        <p><i class="fa-solid fa-envelope"></i> support@shopeasy.com</p>

    </div>

</section>

<footer>

    <div class="footer-content">

        <h3>ShopEasy</h3>

        <p>Your trusted online shopping destination.</p>

        <div class="social-icons">

            <i class="fab fa-facebook"></i>

            <i class="fab fa-instagram"></i>

            <i class="fab fa-twitter"></i>

            <i class="fab fa-linkedin"></i>

        </div>

    </div>

    <p>© 2026 ShopEasy. All Rights Reserved.</p>

</footer>

<script src="js/storage.js"></script>

</body>
</html>
